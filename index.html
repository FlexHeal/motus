<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motus</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script src="script.js" defer></script>


    <div class="vertical-container">
        <h1>Paramètres de jeu</h1>

        <div class="horizontal-container">
            <div class="vertical-container border">
                <h3>Lettre du début</h3>
                <input type="text" id="letter" maxlength="1" placeholder="A">
            </div>

            <div class="vertical-container border">
                <h3>Longueur du mot</h3>
                <input type="number" id="taille" min="1" max="25" value="6" placeholder="6">
            </div>

            <div class="vertical-container border">
                <h3>Nombre de tentatives</h3>
                <input type="number" id="tentatives" min="1" max="20" value="6" placeholder="6">
            </div>

            <div class="vertical-container border">
                <h3>Clavier</h3>
                <select id="clavier-select" title="clavier">
                    <option value="azerty">AZERTY</option>
                    <option value="qwerty">QWERTY</option>
                </select>
            </div>
        </div>

        <button id="start-button">Changer le mot</button>

        <!-- Grille générée en JS -->
        <div id="tentative-container"></div>

        <div id="alert"></div>

        <!-- Clavier généré en JS -->
        <div id="clavier"></div>

        <button id="valid-button">Valider</button>

    </div>
</body>
</html>
